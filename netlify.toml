[build]
  publish = "."
  functions = "netlify/functions"

# Sellers subdomain → sellers.html
[[redirects]]
  from = "/*"
  to = "/sellers.html"
  status = 200
  force = true
  conditions = {Host = ["sellers.umzila.store"]}

# Main site fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200