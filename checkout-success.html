<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="umzila.webp" type="image/webp">
  <title>Order Successful - Umzila</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f7f7f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .success-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 6px 18px rgba(11,13,20,0.08);
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: #28a745;
    }
    h1 {
      color: #0a2f66;
      margin-bottom: 10px;
    }
    p {
      color: #6b6b74;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .order-details {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    .btn {
      display: inline-block;
      background: #0a2f66;
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 10px;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background: #08315f;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your order. Your payment has been processed successfully.</p>
    
    <div class="order-details">
      <div><strong>Order ID:</strong> <span id="orderId">Loading...</span></div>
      <div><strong>Status:</strong> <span style="color: #28a745;">Paid</span></div>
      <div><strong>You will receive:</strong> Order confirmation email shortly</div>
    </div>
    
    <p>We're processing your order and will notify you when it ships.</p>
    
    <a href="index.html" class="btn">Continue Shopping</a>
    <a href="profile.html" class="btn" style="background: #6c757d; margin-left: 10px;">View Orders</a>
  </div>

  <!-- Supabase for updating order notes with preferred delivery -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script>
    const urlParams    = new URLSearchParams(window.location.search);
    const mPaymentId   = urlParams.get('m_payment_id') || '';
    const pfPaymentId  = urlParams.get('pf_payment_id') || '';
    const displayId    = mPaymentId || pfPaymentId || 'N/A';

    document.getElementById('orderId').textContent = displayId;

    // Read seller enrollment data saved in sessionStorage on enroll-seller.html
    const enrollData = JSON.parse(sessionStorage.getItem('seller_enrollment') || '{}');

    // Detect seller enrollment:
    //   Old flow: m_payment_id starts with "SELLER-"
    //   New flow: sessionStorage has enrollment data (static payf.st link)
    const isSellerEnrollment = mPaymentId.startsWith('SELLER-') ||
                               (enrollData.email && enrollData.applicationId && pfPaymentId);

    if (!isSellerEnrollment) {
      // ── Regular product order ──────────────────────────────────────
      // Clear localStorage cart only after confirming payment is paid in DB.
      // The ITN (server-to-server) may arrive slightly before or after the user lands here.
      // Poll up to 8 times (4-second intervals = 32 seconds) to allow ITN to process.
      if (mPaymentId) {
        (async function() {
          try {
            const res = await fetch('/.netlify/functions/get-client-config');
            if (!res.ok) { localStorage.removeItem('ss_cart'); return; }
            const cfg = await res.json();
            const url = cfg.SUPABASE_URL || cfg.supabaseUrl || '';
            const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || '';
            if (!url || !key) { localStorage.removeItem('ss_cart'); return; }

            const sb = supabase.createClient(url, key);

            // Update preferred delivery notes if present
            const preferredDelivery = localStorage.getItem('ss_preferred_delivery');
            if (preferredDelivery) {
              try {
                await sb.from('orders').update({ notes: preferredDelivery }).eq('m_payment_id', mPaymentId);
              } catch (_) {}
              localStorage.removeItem('ss_preferred_delivery');
            }

            // Poll until order shows payment_status = 'paid' before clearing cart
            const MAX_ATTEMPTS = 8;
            const POLL_DELAY   = 4000;
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const { data: order } = await sb
                .from('orders')
                .select('payment_status')
                .eq('m_payment_id', mPaymentId)
                .maybeSingle();

              if (order && order.payment_status === 'paid') {
                localStorage.removeItem('ss_cart');
                localStorage.removeItem('ss_coupon');
                console.log('checkout-success: payment confirmed, cart cleared');
                break;
              }

              if (attempt < MAX_ATTEMPTS) {
                await new Promise(r => setTimeout(r, POLL_DELAY));
              } else {
                // ITN took too long — clear cart optimistically since user reached success page
                console.warn('checkout-success: ITN not yet confirmed after polling, clearing cart optimistically');
                localStorage.removeItem('ss_cart');
                localStorage.removeItem('ss_coupon');
              }
            }
          } catch (_) {
            // Fallback: clear cart anyway since user is on success page
            localStorage.removeItem('ss_cart');
            localStorage.removeItem('ss_coupon');
          }
        })();
      }

    } else {
      // ── Seller enrollment payment ─────────────────────────────────
      document.querySelector('h1').textContent = 'Payment Received!';
      document.querySelector('.order-details').innerHTML =
        '<div><strong>Payment ID:</strong> ' + displayId + '</div>' +
        '<div><strong>Status:</strong> <span style="color:#28a745;">Paid</span></div>' +
        '<div><strong>Next:</strong> Setting up your seller account&hellip;</div>';
      document.querySelector('p').textContent = 'Please wait while we activate your seller account.';

      // Always attempt enrollment — the function can derive email + applicationId
      // from the order row if sessionStorage was lost (new tab / private browsing).
      const MAX_ATTEMPTS = 15;
      const RETRY_DELAY  = 4000;

      function showRetryButton() {
        const details = document.querySelector('.order-details');
        if (document.getElementById('retryBtn')) return;
        const btn = document.createElement('button');
        btn.id = 'retryBtn';
        btn.textContent = 'Try Again';
        btn.style.cssText = 'margin-top:14px;padding:10px 24px;background:#0a2f66;color:#fff;border:none;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;display:block';
        btn.onclick = function() { btn.remove(); completeEnrollment(1); };
        details.appendChild(btn);
      }

      async function completeEnrollment(attempt) {
        try {
          const payload = {};
          // Pass whatever we have — the function will fill in the rest from the DB
          if (enrollData.email)         payload.email         = enrollData.email;
          if (enrollData.name)          payload.name          = enrollData.name;
          if (enrollData.applicationId) payload.applicationId = enrollData.applicationId;
          if (pfPaymentId)              payload.pf_payment_id = pfPaymentId;
          if (mPaymentId.startsWith('SELLER-')) payload.m_payment_id = mPaymentId;

          const res  = await fetch('/.netlify/functions/complete-seller-enrollment', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
          });
          const data = await res.json();

          if (data.success) {
            sessionStorage.removeItem('seller_enrollment');
            localStorage.removeItem('ss_cart');
            window.location.href = '/seller-dashboard.html';
          } else if (res.status === 402 && attempt < MAX_ATTEMPTS) {
            // ITN still processing — wait and retry
            document.querySelector('.order-details').lastElementChild.textContent =
              'Confirming payment… (' + attempt + ' of ' + MAX_ATTEMPTS + ')';
            setTimeout(() => completeEnrollment(attempt + 1), RETRY_DELAY);
          } else if (res.status === 402) {
            // Exhausted retries
            document.querySelector('.order-details').lastElementChild.textContent =
              'Payment confirmed but activation is taking longer than expected.';
            showRetryButton();
          } else {
            document.querySelector('.order-details').innerHTML +=
              '<div style="color:#dc3545;margin-top:8px;">Account setup failed: ' + (data.error || 'Unknown error') +
              '. Please contact <strong>support@umzila.store</strong> with your Payment ID.</div>';
            showRetryButton();
          }
        } catch (err) {
          if (attempt < MAX_ATTEMPTS) {
            setTimeout(() => completeEnrollment(attempt + 1), RETRY_DELAY);
          } else {
            document.querySelector('.order-details').innerHTML +=
              '<div style="color:#dc3545;margin-top:8px;">Network error during account setup. ' +
              'Please contact <strong>support@umzila.store</strong> with your Payment ID.</div>';
            showRetryButton();
          }
        }
      }
      completeEnrollment(1);
    }
  </script>
</body>
</html>
