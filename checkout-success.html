<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="umzila.webp" type="image/webp">
  <title>Order Successful - Umzila</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f7f7f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .success-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 6px 18px rgba(11,13,20,0.08);
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: #28a745;
    }
    h1 {
      color: #0a2f66;
      margin-bottom: 10px;
    }
    p {
      color: #6b6b74;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .order-details {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    .btn {
      display: inline-block;
      background: #0a2f66;
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 10px;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background: #08315f;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your order. Your payment has been processed successfully.</p>
    
    <div class="order-details">
      <div><strong>Order ID:</strong> <span id="orderId">Loading...</span></div>
      <div><strong>Status:</strong> <span style="color: #28a745;">Paid</span></div>
      <div><strong>You will receive:</strong> Order confirmation email shortly</div>
    </div>
    
    <p>We're processing your order and will notify you when it ships.</p>
    
    <a href="index.html" class="btn">Continue Shopping</a>
    <a href="profile.html" class="btn" style="background: #6c757d; margin-left: 10px;">View Orders</a>
  </div>

  <!-- Supabase for updating order notes with preferred delivery -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script>
    const urlParams    = new URLSearchParams(window.location.search);
    const mPaymentId   = urlParams.get('m_payment_id') || '';
    const pfPaymentId  = urlParams.get('pf_payment_id') || '';
    const displayId    = mPaymentId || pfPaymentId || 'N/A';

    document.getElementById('orderId').textContent = displayId;

    // Read seller enrollment data saved in sessionStorage on enroll-seller.html
    const enrollData = JSON.parse(sessionStorage.getItem('seller_enrollment') || '{}');

    // Detect seller enrollment:
    //   Old flow: m_payment_id starts with "SELLER-"
    //   New flow: sessionStorage has enrollment data (static payf.st link)
    const isSellerEnrollment = mPaymentId.startsWith('SELLER-') ||
                               (enrollData.email && enrollData.applicationId && pfPaymentId);

    if (!isSellerEnrollment) {
      // ── Regular product order ──────────────────────────────────────
      if (mPaymentId) {
        const preferredDelivery = localStorage.getItem('ss_preferred_delivery');
        if (preferredDelivery) {
          (async function() {
            try {
              const res = await fetch('/.netlify/functions/get-client-config');
              if (res.ok) {
                const cfg = await res.json();
                const url = cfg.SUPABASE_URL || cfg.supabaseUrl || '';
                const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || '';
                if (url && key) {
                  const sb = supabase.createClient(url, key);
                  await sb.from('orders').update({ notes: preferredDelivery }).eq('m_payment_id', mPaymentId);
                }
              }
            } catch (_) {}
            localStorage.removeItem('ss_preferred_delivery');
          })();
        }
      }
      localStorage.removeItem('ss_cart');

    } else {
      // ── Seller enrollment payment ─────────────────────────────────
      document.querySelector('h1').textContent = 'Payment Received!';
      document.querySelector('.order-details').innerHTML =
        '<div><strong>Payment ID:</strong> ' + displayId + '</div>' +
        '<div><strong>Status:</strong> <span style="color:#28a745;">Paid</span></div>' +
        '<div><strong>Next:</strong> Setting up your seller account&hellip;</div>';
      document.querySelector('p').textContent = 'Please wait while we activate your seller account.';

      if (!enrollData.email || !enrollData.applicationId) {
        // sessionStorage lost (new tab / private browsing)
        document.querySelector('.order-details').innerHTML =
          '<div><strong>Payment ID:</strong> ' + displayId + '</div>' +
          '<div><strong>Status:</strong> <span style="color:#28a745;">Paid</span></div>' +
          '<div style="color:#dc3545;margin-top:8px;">Your payment was received but we could not complete account setup automatically. ' +
          'Please contact <strong>support@umzila.store</strong> quoting your Payment ID above.</div>';
      } else {
        // Complete enrollment — retry up to 5 times (ITN may still be in-flight)
        async function completeEnrollment(attempt) {
          try {
            const payload = {
              email:         enrollData.email,
              name:          enrollData.name || '',
              applicationId: enrollData.applicationId
            };
            // New flow: pf_payment_id is the payment reference
            if (pfPaymentId) payload.pf_payment_id = pfPaymentId;
            // Old flow fallback
            if (mPaymentId.startsWith('SELLER-')) payload.m_payment_id = mPaymentId;

            const res  = await fetch('/.netlify/functions/complete-seller-enrollment', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
              sessionStorage.removeItem('seller_enrollment');
              localStorage.removeItem('ss_cart');
              window.location.href = '/seller-dashboard.html';
            } else if (res.status === 402 && attempt < 5) {
              // ITN still processing — wait and retry
              document.querySelector('.order-details').lastElementChild.textContent =
                'Confirming payment… (attempt ' + attempt + ' of 5)';
              setTimeout(() => completeEnrollment(attempt + 1), 4000);
            } else {
              document.querySelector('.order-details').innerHTML +=
                '<div style="color:#dc3545;margin-top:8px;">Account setup failed: ' + (data.error || 'Unknown error') +
                '. Please contact <strong>support@umzila.store</strong> with your Payment ID.</div>';
            }
          } catch (err) {
            if (attempt < 5) {
              setTimeout(() => completeEnrollment(attempt + 1), 4000);
            } else {
              document.querySelector('.order-details').innerHTML +=
                '<div style="color:#dc3545;margin-top:8px;">Account setup encountered a network error. ' +
                'Please contact <strong>support@umzila.store</strong> with your Payment ID.</div>';
            }
          }
        }
        completeEnrollment(1);
      }
    }
  </script>
</body>
</html>
