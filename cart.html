<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="umzila.webp" type="image/webp">
  <title>Cart — Umzila</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <style>
    /* Tokens match checkout.html's system — same brand, same page. */
    :root{
      --bg:#f7f7f9;--card:#fff;--muted:#6b6b74;--accent:#0a2f66;--accent-2:#00a0ff;
      --cta:#ff6b2c;--success:#28a745;--border:#e6e6ea;
      --shadow-sm:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05);
      --shadow:0 6px 18px rgba(11,13,20,0.08);
      --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-pill:999px;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',"Segoe UI",Roboto,system-ui,sans-serif}
    .hidden{display:none !important}
    body{background:var(--bg);color:#111;min-height:100vh}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    header{background:#fff;padding:14px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
    .logo{font-weight:800;font-size:18px;color:var(--accent)}
    .header-back{display:flex;align-items:center;gap:6px;padding:9px 14px;min-height:38px;border-radius:var(--radius-pill);border:none;background:none;color:var(--accent);cursor:pointer;font-size:14px;font-weight:600}
    .header-back:hover{background:#f0f4ff}
    .header-count{margin-left:auto;font-size:13px;color:var(--muted)}
    .header-count strong{color:var(--accent);font-weight:700}

    .container{max-width:960px;margin:0 auto;padding:28px 18px 60px}
    h2{color:var(--accent);font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-0.3px}
    .muted{color:var(--muted);font-size:13px}

    .cart-wrap{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-top:20px;align-items:start}
    @media(max-width:700px){.cart-wrap{grid-template-columns:1fr}}

    .panel{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:22px}

    /* ── Cart items ── */
    .cart-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid #f0f0f5;align-items:flex-start}
    .cart-item:first-child{padding-top:0}
    .cart-item:last-child{border-bottom:none;padding-bottom:0}
    .cart-item img{width:76px;height:76px;object-fit:cover;border-radius:var(--radius-md);flex-shrink:0;background:#f4f6fb}
    .cart-item-info{flex:1;min-width:0}
    .cart-item-name{font-weight:700;font-size:15px;line-height:1.35}
    .cart-item-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .cart-item-price{font-weight:800;font-size:15px;color:var(--accent);margin-top:6px}
    .cart-item-controls{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}

    .qty-stepper{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:var(--radius-pill);overflow:hidden}
    .qty-btn{width:32px;height:32px;min-width:32px;border:none;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent)}
    .qty-btn:hover{background:#f4f6fb}
    .qty-btn:active{transform:scale(0.92)}
    .qty-display{font-weight:700;min-width:26px;text-align:center;font-size:13px}

    select.size-select{padding:7px 10px;border-radius:var(--radius-pill);border:1px solid var(--border);font-size:12px;background:#fff;cursor:pointer;color:#333}
    .remove-btn{background:none;border:none;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;padding:8px 4px;min-height:32px;text-decoration:underline;text-underline-offset:2px}
    .remove-btn:hover{color:#c0392b}

    /* ── Order summary ── */
    .summary-header{color:var(--accent);font-size:17px;font-weight:800;margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid #f8f9fa}
    .summary-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;color:#333}
    .summary-row span:last-child{font-weight:600}
    .summary-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:14px;margin-top:6px;border-top:2px solid #f8f9fa}
    .summary-total span:first-child{font-weight:700;font-size:15px;color:var(--accent)}
    .summary-total span:last-child{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--accent);font-variant-numeric:tabular-nums}

    .checkout-btn{display:block;width:100%;padding:15px;background:var(--cta);color:#fff;border:none;border-radius:var(--radius-pill);font-size:16px;font-weight:800;cursor:pointer;margin-top:18px;transition:opacity .15s;min-height:48px}
    .checkout-btn:hover{opacity:.9}
    .checkout-btn:active{transform:scale(0.98)}
    .checkout-btn:disabled{opacity:.5;cursor:not-allowed}
    .continue-link{display:block;text-align:center;margin-top:12px;font-size:13px;color:var(--muted);padding:8px;min-height:36px}
    .continue-link:hover{color:var(--accent)}

    /* Invitation, not an apology — matches checkout.html's tone. */
    .empty-cart{text-align:center;padding:64px 20px}
    .empty-cart-icon{font-size:44px;margin-bottom:14px}
    .empty-cart-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px}
    .empty-cart-sub{font-size:14px;color:var(--muted);margin-bottom:22px}
    .empty-cart-cta{display:inline-block;padding:13px 28px;background:var(--cta);color:#fff;border-radius:var(--radius-pill);font-weight:700;font-size:14px}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:var(--radius-pill);font-size:14px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none}
    .toast.show{opacity:1}
    .loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:500;align-items:center;justify-content:center}
    .loading-overlay.show{display:flex}
    .spinner{width:40px;height:40px;border:4px solid #e6e6ea;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Discount code ── */
    .promo-row{display:flex;gap:8px;margin:16px 0 4px}
    .promo-row input{flex:1;min-width:0;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-pill);font-size:14px}
    .promo-row input:focus{outline:none;border-color:var(--accent)}
    .promo-btn{padding:11px 18px;min-height:44px;border:none;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
    .promo-msg{font-size:12px;margin:2px 0 8px;min-height:16px}
    .promo-msg.success{color:var(--success)}
    .promo-msg.error{color:#c0392b}
    .summary-row.discount span:last-child{color:var(--success);font-weight:700}

    /* ── Mobile: sticky bottom bar (the ONLY persistent bottom chrome —
         no separate nav competing with it) ── */
    @media(max-width:700px){
      body{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
      .container{padding-top:20px}
      .panel{padding:18px;border-radius:var(--radius-md)}
      .cart-item img{width:66px;height:66px}
      #summaryPanel{
        position:fixed;left:0;right:0;bottom:0;z-index:200;
        border-radius:18px 18px 0 0;box-shadow:0 -6px 20px rgba(11,13,20,0.12);
        margin:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
      }
      #summaryPanel .summary-header,#summaryRows,.promo-row,#promoMsg,.continue-link{display:none}
      #summaryPanel .summary-total{border-top:none;padding-top:0;margin-top:0}
      #discountRow{display:none !important}
      .checkout-btn{margin-top:10px;padding:15px}
    }
  </style>

  <script>
  (async function initSupabase(){
    try{
      const res = await fetch('/.netlify/functions/get-client-config');
      const cfg = await res.json().catch(()=>({}));
      const url = cfg.supabaseUrl || cfg.SUPABASE_URL || cfg.url || '';
      const key = cfg.supabaseAnonKey || cfg.SUPABASE_ANON_KEY || cfg.anonKey || '';
      if(url && key){
        window.supabaseClient = supabase.createClient(url, key);
        window.supabase = window.supabaseClient;
      }
      document.dispatchEvent(new CustomEvent('supabase-ready', { detail: { supabaseClient: window.supabaseClient } }));
    }catch(e){ document.dispatchEvent(new CustomEvent('supabase-ready', { detail: {} })); }
  })();
  </script>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="toast" id="toast"></div>

  <header>
    <button class="header-back" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="logo">Umzila</div>
    <div class="header-count">Cart · <strong id="cartCountBadge">0</strong> items</div>
  </header>

  <div class="container">
    <h2>Your Cart</h2>
    <div class="muted">Review and edit your items before checkout</div>

    <div class="cart-wrap">
      <div class="panel" id="cartPanel">
        <div id="cartItemsContainer"></div>
      </div>

      <div>
        <div class="panel" id="summaryPanel">
          <div class="summary-header">Order Summary</div>
          <div id="summaryRows"></div>

          <div class="promo-row">
            <input type="text" id="promoInput" placeholder="Discount code">
            <button id="promoApplyBtn" class="promo-btn">Apply</button>
          </div>
          <div id="promoMsg" class="promo-msg"></div>
          <div class="summary-row discount hidden" id="discountRow">
            <span>Discount</span>
            <span id="discountAmount">-R0.00</span>
          </div>

          <div class="summary-total">
            <span>Total</span>
            <span id="summaryTotal">R0.00</span>
          </div>
          <button class="checkout-btn" id="checkoutBtn" disabled>Proceed to Checkout</button>
          <a href="index.html" class="continue-link">Continue shopping</a>
        </div>
      </div>
    </div>
  </div>

<script>
(async function(){
  await new Promise(resolve=>{
    if(window.supabaseClient) return resolve();
    document.addEventListener('supabase-ready', ()=>resolve());
    setTimeout(resolve, 4000);
  });

  const sb = window.supabaseClient;
  let cart = [];
  let variantsCache = {}; // product_id → variants[]
  let currentUser = null;

  function esc(s){ return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmt(v){ return 'R' + Number(v||0).toFixed(2); }
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
  function setLoading(on){ document.getElementById('loadingOverlay').classList.toggle('show',on); }

  // Get current user
  if(sb){
    try{ const { data } = await sb.auth.getSession(); currentUser = data?.session?.user || null; }catch(e){}
  }

  function readLocalCart(){
    try{ return JSON.parse(localStorage.getItem('ss_cart') || '[]'); }catch(e){ return []; }
  }

  function writeLocalCart(items){
    try{ localStorage.setItem('ss_cart', JSON.stringify(items)); }catch(e){}
  }

  async function writeSupabaseCart(items){
    if(!sb || !currentUser) return;
    try{
      await sb.from('carts').upsert([{ user_id: currentUser.id, items }], { onConflict: ['user_id'] });
    }catch(e){ console.warn('cart sync error',e); }
  }

  async function loadCart(){
    cart = readLocalCart();
    // If logged in, prefer Supabase cart
    if(sb && currentUser){
      try{
        const { data } = await sb.from('carts').select('items').eq('user_id', currentUser.id).single();
        if(data?.items && Array.isArray(data.items) && data.items.length > 0){
          cart = data.items;
          writeLocalCart(cart);
        }
      }catch(e){}
    }
    return cart;
  }

  async function fetchVariants(productId){
    if(variantsCache[productId]) return variantsCache[productId];
    if(!sb) return [];
    try{
      const { data } = await sb.from('product_variants').select('id,size,stock,price_override').eq('product_id', productId);
      variantsCache[productId] = data || [];
      return variantsCache[productId];
    }catch(e){ return []; }
  }

  function calcTotal(){
    return cart.reduce((s,item)=> s + (Number(item.price||0) * Number(item.quantity||item.qty||1)), 0);
  }

  // Discount code — server-validated via validate-cart.js's shared discount
  // engine (netlify/functions/lib/discounts.js), never computed client-side
  // or read directly from discount_codes (that'd expose seller-created
  // codes' terms to anyone with the anon key, and let a tampered client
  // trust its own math). Same localStorage['ss_coupon'] shape checkout.html
  // reads on load, so a code applied here carries straight through — but
  // checkout.html re-validates it again itself, never trusts this cache.
  let appliedCoupon = null;      // { code }
  let currentDiscountInfo = null; // last server response's `discount` object
  (function loadStoredCoupon(){
    try {
      const saved = JSON.parse(localStorage.getItem('ss_coupon') || 'null');
      if (saved && saved.code) appliedCoupon = { code: saved.code };
    } catch(_) {}
  })();

  function currentDiscount(){
    return (currentDiscountInfo && currentDiscountInfo.valid) ? (currentDiscountInfo.amount || 0) : 0;
  }

  // Re-validates the currently-applied code against the live cart —
  // called after applying, and after any qty/remove change (a scoped code's
  // amount depends on which eligible items are actually still in the cart).
  async function refreshAppliedCoupon(){
    if (!appliedCoupon?.code) { currentDiscountInfo = null; return; }
    try {
      const res = await fetch('/.netlify/functions/validate-cart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          cartItems: cart,
          userId: currentUser?.id,
          couponCode: appliedCoupon.code,
          customerEmail: currentUser?.email || ''
        })
      });
      const result = res.ok ? await res.json() : null;
      currentDiscountInfo = result?.discount || null;
      if (!currentDiscountInfo || (!currentDiscountInfo.valid && !currentDiscountInfo.requiresSignIn)) {
        // Code is no longer valid at all (expired, fully redeemed, etc.) —
        // drop it rather than keep showing a dead code.
        appliedCoupon = null;
        localStorage.removeItem('ss_coupon');
      }
    } catch (e) {
      console.warn('Coupon re-validation failed', e);
    }
  }

  async function applyCoupon(code){
    const msgEl = document.getElementById('promoMsg');
    msgEl.className = 'promo-msg';
    if (!code) { msgEl.classList.add('error'); msgEl.textContent = 'Enter a code first.'; return; }
    appliedCoupon = { code: code.trim().toUpperCase() };
    await refreshAppliedCoupon();
    if (!currentDiscountInfo || !currentDiscountInfo.valid) {
      const reasons = {
        expired: 'This code has expired.',
        email_required: 'Enter your email at checkout to apply this code.',
        email_mismatch: 'This code is not valid for your account.',
        not_first_order: 'This code is valid for first-time orders only.',
        already_used: 'This code has already been used.',
        already_redeemed_by_you: 'You’ve already used this code.',
        fully_redeemed: 'This code has reached its usage limit.'
      };
      msgEl.classList.add('error');
      msgEl.textContent = reasons[currentDiscountInfo?.reason] || 'Invalid or expired promo code';
      appliedCoupon = null;
      currentDiscountInfo = null;
      localStorage.removeItem('ss_coupon');
      updateSummary();
      return;
    }
    localStorage.setItem('ss_coupon', JSON.stringify({ code: appliedCoupon.code }));
    if (currentDiscountInfo.requiresSignIn) {
      msgEl.classList.add('success');
      msgEl.textContent = `Sign in at checkout to use this code — ${fmt(currentDiscountInfo.previewAmount || 0)} off waiting for you`;
    } else {
      msgEl.classList.add('success');
      msgEl.textContent = `Promo code applied! Discount: ${fmt(currentDiscount())}`;
    }
    document.getElementById('promoInput').value = '';
    updateSummary();
  }

  function updateSummary(){
    const subtotal = calcTotal();
    const discount = currentDiscount();
    const total = Math.max(0, subtotal - discount);
    const badge = document.getElementById('cartCountBadge');
    const sumRows = document.getElementById('summaryRows');
    const sumTotal = document.getElementById('summaryTotal');
    const checkBtn = document.getElementById('checkoutBtn');
    const discountRow = document.getElementById('discountRow');
    const discountAmount = document.getElementById('discountAmount');
    if(badge) badge.textContent = cart.length;
    if(sumRows){
      sumRows.innerHTML = cart.map(item=>{
        const qty = item.quantity || item.qty || 1;
        return `<div class="summary-row"><div>${esc(item.name||item.title||'Item')} ${item.size?'× '+esc(item.size):''} ×${qty}</div><div>${fmt(Number(item.price||0)*qty)}</div></div>`;
      }).join('');
    }
    const requiresSignIn = currentDiscountInfo?.requiresSignIn;
    if(discountRow) discountRow.classList.toggle('hidden', discount <= 0 && !requiresSignIn);
    if(discountAmount) discountAmount.textContent = '-' + fmt(requiresSignIn ? (currentDiscountInfo.previewAmount || 0) : discount);
    let signInNote = document.getElementById('discountSignInNote');
    if (requiresSignIn) {
      if (!signInNote) {
        signInNote = document.createElement('div');
        signInNote.id = 'discountSignInNote';
        signInNote.style.cssText = 'font-size:11px;color:#e0284f;margin-top:-2px;margin-bottom:6px';
        discountRow?.insertAdjacentElement('afterend', signInNote);
      }
      signInNote.textContent = 'Sign in at checkout to use this code';
      signInNote.style.display = 'block';
    } else if (signInNote) {
      signInNote.style.display = 'none';
    }
    if(sumTotal) sumTotal.textContent = fmt(total);
    if(checkBtn) checkBtn.disabled = cart.length === 0;
  }

  async function renderCart(){
    const container = document.getElementById('cartItemsContainer');
    if(!container) return;
    if(!cart.length){
      container.innerHTML = `<div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <div class="empty-cart-title">Your cart is empty</div>
        <div class="empty-cart-sub">Find something good from a campus shop</div>
        <a href="index.html" class="empty-cart-cta">Start shopping</a>
      </div>`;
      updateSummary();
      return;
    }

    // Pre-fetch variants for all product ids
    const productIds = [...new Set(cart.map(i=>i.product_id||i.id).filter(Boolean))];
    await Promise.all(productIds.map(pid=>fetchVariants(pid)));

    container.innerHTML = '';
    cart.forEach((item, idx)=>{
      const pid = item.product_id || item.id || '';
      const variants = variantsCache[pid] || [];
      const uniqueSizes = [...new Set(variants.filter(v=>v.stock>0).map(v=>v.size).filter(Boolean))];
      const qty = item.quantity || item.qty || 1;
      const imgSrc = item.image || item.thumbnail || 'https://placehold.co/80x80?text=Item';

      const sizeOptions = uniqueSizes.length
        ? `<select class="size-select" data-idx="${idx}">
            ${uniqueSizes.map(s=>`<option value="${esc(s)}" ${s===(item.size||'')?'selected':''}>${esc(s)}</option>`).join('')}
           </select>`
        : (item.size ? `<span style="font-size:13px;color:var(--muted)">${esc(item.size)}</span>` : '');

      const el = document.createElement('div');
      el.className = 'cart-item';
      el.dataset.idx = idx;
      el.innerHTML = `
        <img src="${esc(imgSrc)}" alt="${esc(item.name||item.title||'')}" onerror="this.src='https://placehold.co/80x80?text=Item'" />
        <div class="cart-item-info">
          <div class="cart-item-name">${esc(item.name||item.title||'Product')}</div>
          <div class="cart-item-sub">${item.seller_name ? esc(item.seller_name) : ''}</div>
          <div class="cart-item-price">${fmt(Number(item.price||0)*qty)}</div>
          <div class="cart-item-controls">
            <div class="qty-stepper">
              <button class="qty-btn" data-action="minus" data-idx="${idx}">−</button>
              <span class="qty-display">${qty}</span>
              <button class="qty-btn" data-action="plus" data-idx="${idx}">+</button>
            </div>
            ${sizeOptions}
            <button class="remove-btn" data-idx="${idx}">Remove</button>
          </div>
          ${item.preferred_delivery ? `<div class="muted" style="margin-top:6px;font-size:12px">🚚 Preferred: ${esc(item.preferred_delivery)}</div>` : ''}
        </div>`;
      container.appendChild(el);
    });

    // Bind controls
    container.querySelectorAll('.qty-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const idx = Number(btn.dataset.idx);
        const action = btn.dataset.action;
        const currentQty = cart[idx].quantity || cart[idx].qty || 1;
        if(action === 'minus'){
          if(currentQty <= 1){ await removeItem(idx); return; }
          cart[idx].quantity = currentQty - 1;
          if('qty' in cart[idx]) cart[idx].qty = cart[idx].quantity;
        } else {
          cart[idx].quantity = currentQty + 1;
          if('qty' in cart[idx]) cart[idx].qty = cart[idx].quantity;
        }
        await syncAndRender();
      });
    });

    container.querySelectorAll('select.size-select').forEach(sel=>{
      sel.addEventListener('change', async ()=>{
        const idx = Number(sel.dataset.idx);
        const newSize = sel.value;
        const pid = cart[idx].product_id || cart[idx].id;
        const variants = variantsCache[pid] || [];
        const matchVariant = variants.find(v=>v.size===newSize);
        cart[idx].size = newSize;
        if(matchVariant && matchVariant.price_override){
          cart[idx].price = Number(matchVariant.price_override);
        }
        if(matchVariant) cart[idx].variant_id = matchVariant.id;
        await syncAndRender();
      });
    });

    container.querySelectorAll('.remove-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const idx = Number(btn.dataset.idx);
        await removeItem(idx);
      });
    });

    updateSummary();
  }

  async function removeItem(idx){
    cart.splice(idx, 1);
    await syncAndRender();
    toast('Item removed');
  }

  async function syncAndRender(){
    writeLocalCart(cart);
    if(sb && currentUser) await writeSupabaseCart(cart);
    // Re-check the applied code — a scoped code's amount depends on which
    // eligible items are still in the cart after a qty change/removal.
    await refreshAppliedCoupon();
    await renderCart();
  }

  // Checkout button
  document.getElementById('checkoutBtn')?.addEventListener('click', ()=>{
    if(!cart.length){ toast('Your cart is empty'); return; }
    window.location.href = 'checkout.html';
  });

  document.getElementById('promoApplyBtn')?.addEventListener('click', ()=>{
    applyCoupon(document.getElementById('promoInput').value.trim());
  });
  document.getElementById('promoInput')?.addEventListener('keypress', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); applyCoupon(e.target.value.trim()); }
  });

  // Init
  setLoading(true);
  await loadCart();
  await refreshAppliedCoupon();
  await renderCart();
  setLoading(false);
})();
</script>
</body>
</html>
